# Catch-all: any other old Rails route not handled above -> home. Real pages and
# assets are served before redirects, and every specific rule above is matched
# first (Netlify is top-to-bottom), so this only sweeps up unmapped legacy paths.
[[redirects]]
  from = "/*"
  to = "/"
  status = 301

[[headers]]
  for = "*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=15552000; includeSubDomains"
    Referrer-Policy = "no-referrer-when-downgrade"
    Cache-Control = "public, max-age=604800, s-max-age=604800"

[[headers]]
  for = "/*.(png|jpg|jpeg|js|css|svg|webp|woff|ttf|eot|ico|woff2)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, s-max-age=31536000"
