[dev]
  command = "bin/bridgetown dev"
  targetPort = 4000
  port = 8888
  publish = "output"
  autoLaunch = true
  framework = "#custom"

[context.dev.build.environment]
  NODE_ENV = "development"
  BRIDGETOWN_ENV = "development"

[build]
  command = "bin/bridgetown deploy"
  publish = "output"

[build.environment]
  NODE_ENV = "development"
  BRIDGETOWN_ENV = "production"

[build.processing.html]
  pretty_urls = true

# --- Cutover redirects (Rails app -> static site) ---
# Public content URLs (/articles/, /events/) map 1:1 via pretty permalinks and
# need no redirects. Specific rules come first; Netlify evaluates top-to-bottom
# and stops at the first match.

# /pricing was intentionally removed -> send to home (301 permanent)
[[redirects]]
  from = "/pricing"
  to = "/"
  status = 301

[[redirects]]
  from = "/pricing/"
  to = "/"
  status = 301

# Contact/newsletter/inquiry forms are gone -> the /contact page (a mailto) is
# the single contact surface now (301).
[[redirects]]
  from = "/inquiries"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/inquiries/*"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/contacts"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/contacts/*"
  to = "/contact/"
  status = 301

# Docs and announcements collections were dropped in the migration (they were
# help/changelog surfaces for the sunset product) -> send to home (301).
[[redirects]]
  from = "/docs"
  to = "/"
  status = 301

[[redirects]]
  from = "/docs/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/announcements"
  to = "/"
  status = 301

[[redirects]]
  from = "/announcements/*"
  to = "/"
  status = 301

# Legacy blog URLs. The old Rails site served articles at dated paths
# /YYYY/MM/DD/:slug/. This blanket rule (4 path segments) maps any of them to
# the current article; it only fires when no static file matches, and no real
# 4-segment HTML route exists, so it can't shadow live pages.
[[redirects]]
  from = "/:year/:month/:day/:slug"
  to = "/articles/:slug/"
  status = 301

# Articles whose slug changed over time (FriendlyId history). Redirect the old
# slug to the current one. Old *dated* URLs with these slugs chain: the blanket
# rule above sends /YYYY/MM/DD/<old> -> /articles/<old>/, which then matches
# one of these -> /articles/<current>/.
[[redirects]]
  from = "/articles/data-center-server-recycling-automation"
  to = "/articles/reducing-the-impact-of-data-centers-with-mathematics/"
  status = 301

[[redirects]]
  from = "/articles/reducing-the-impact-of-data-centers-with-mathmatics"
  to = "/articles/reducing-the-impact-of-data-centers-with-mathematics/"
  status = 301

[[redirects]]
  from = "/articles/portland-state-university-nvidia-advancing-ai-with-langchain"
  to = "/articles/langchain-nvidia-nim-ai-innovation-at-gtc-2025/"
  status = 301

[[redirects]]
  from = "/articles/new-free-course-nasa-robotics-alliance-grant-scholarship-overview"
  to = "/articles/new-first-robotics-competition-frc-teams-unlock-nasa-grant-opportunity-for-your-robotics-journey/"
  status = 301

[[redirects]]
  from = "/articles/new-ftc-or-frc-team-unlock-nasa-support-for-your-robotics-journey"
  to = "/articles/new-first-robotics-competition-frc-teams-unlock-nasa-grant-opportunity-for-your-robotics-journey/"
  status = 301

[[redirects]]
  from = "/articles/new-first-teams-ftc-and-frc-unlock-nasa-grant-opportunity-for-your-robotics-journey"
  to = "/articles/new-first-robotics-competition-frc-teams-unlock-nasa-grant-opportunity-for-your-robotics-journey/"
  status = 301

# The Waivolt/NATC post was deleted -> send its current slug (and the dated URL,
# which chains here via the blanket rule above) and its historical slug to the
# articles index rather than a 404.
[[redirects]]
  from = "/articles/waivolt-by-rose-city-robotics-becomes-natc-approved-and-launches-free-nabcep-pv-associate-practice-exam"
  to = "/articles/"
  status = 301

[[redirects]]
  from = "/articles/waivolt-earns-nabcep-accredited-training-company"
  to = "/articles/"
  status = 301

[[redirects]]
  from = "/articles/rose-city-robotics-is-now-a-nabcep-accredited-solar-provider"
  to = "/articles/rose-city-robotics-is-now-a-nabcep-accredited-training-provider/"
  status = 301

[[redirects]]
  from = "/articles/why-in-person-robotics-with-a-cohort-beats-going-solo"
  to = "/articles/why-robotics-in-person-with-a-cohort-beats-going-solo/"
  status = 301

[[redirects]]
  from = "/articles/the-term-full-stack-engineer-is-changing-fast"
  to = "/articles/my-definition-of-full-stack-engineer-is-changing-fast/"
  status = 301

# Dead authenticated/app-only surfaces -> 410 Gone so search engines drop them.
# to = "/404.html" supplies the response body; the 410 status is what matters.
[[redirects]]
  from = "/admin/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/accounts/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/account/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/account_invitations/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/api/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/api_tokens/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/subscriptions/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/charges/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/users/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/user/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/cad_projects/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/dashboard"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/notifications/*"
  to = "/404.html"
  status = 410

[[redirects]]
  from = "/agreements/*"
  to = "/404.html"
  status = 410

[[headers]]
  for = "*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=15552000; includeSubDomains"
    Referrer-Policy = "no-referrer-when-downgrade"
    Cache-Control = "public, max-age=604800, s-max-age=604800"

[[headers]]
  for = "/*.(png|jpg|jpeg|js|css|svg|webp|woff|ttf|eot|ico|woff2)"
  [headers.values]
    Cache-Control = "public, max-age=31536000, s-max-age=31536000"
