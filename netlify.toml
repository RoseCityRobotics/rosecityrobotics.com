[dev]
  command = "bin/bridgetown dev"
  targetPort = 4000
  port = 8888
  publish = "output"
  autoLaunch = true
  framework = "#custom"

[context.dev.build.environment]
  NODE_ENV = "development"
  BRIDGETOWN_ENV = "development"

[build]
  command = "bin/bridgetown deploy"
  publish = "output"

[build.environment]
  NODE_ENV = "development"
  BRIDGETOWN_ENV = "production"

[build.processing.html]
  pretty_urls = true

# --- Cutover redirects (Rails app -> static site) ---
# Public content URLs (/articles/, /events/) map 1:1 via pretty permalinks and
# need no redirects. Specific rules come first; Netlify evaluates top-to-bottom
# and stops at the first match.

# /pricing was intentionally removed -> send to home (301 permanent)
[[redirects]]
  from = "/pricing"
  to = "/"
  status = 301

[[redirects]]
  from = "/pricing/"
  to = "/"
  status = 301

# Contact/newsletter/inquiry forms are gone -> the /contact page (a mailto) is
# the single contact surface now (301).
[[redirects]]
  from = "/inquiries"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/inquiries/*"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/contacts"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/contacts/*"
  to = "/contact/"
  status = 301

# Docs and announcements collections were dropped in the migration (they were
# help/changelog surfaces for the sunset product) -> send to home (301).
[[redirects]]
  from = "/docs"
  to = "/"
  status = 301

[[redirects]]
  from = "/docs/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/announcements"
  to = "/"
  status = 301

[[redirects]]
  from = "/announcements/*"
  to = "/"
  status = 301

# Legacy blog URLs. The old Rails site served articles at dated paths
# /YYYY/MM/DD/:slug/. This blanket rule (4 path segments) maps any of them to
# the current article; it only fires when no static file matches, and no real
# 4-segment HTML route exists, so it can't shadow live pages.
[[redirects]]
  from = "/:year/:month/:day/:slug"
  to = "/articles/:slug/"
  status = 301

# Articles whose slug changed over time (FriendlyId history). Redirect the old
# slug to the current one. Old *dated* URLs with these slugs chain: the blanket
# rule above sends /YYYY/MM/DD/<old> -> /articles/<old>/, which then matches
# one of these -> /articles/<current>/.
[[redirects]]
  from = "/articles/data-center-server-recycling-automation"
  to = "/articles/reducing-the-impact-of-data-centers-with-mathematics/"
  status = 301

[[redirects]]
  from = "/articles/reducing-the-impact-of-data-centers-with-mathmatics"
  to = "/articles/reducing-the-impact-of-data-centers-with-mathematics/"
