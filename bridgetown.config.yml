url: "https://rosecityrobotics.com"

permalink: pretty
template_engine: erb
timezone: America/Los_Angeles

# Publish future-dated content. Essential for the events collection (upcoming
# events are the point) and for any scheduled articles.
future: true

kramdown:
  input: GFM

pagination:
  enabled: true
  per_page: 12

collections:
  articles:
    output: true
    permalink: "/articles/:slug/"
    sort_by: published_at
    sort_direction: descending
  events:
    output: true
    permalink: "/events/:slug/"
    sort_by: start_datetime
    sort_direction: descending
